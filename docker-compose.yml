services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ro-postgres
    environment:
      POSTGRES_USER: ro
      POSTGRES_PASSWORD: ro_local_dev
      POSTGRES_DB: ro
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
      - ./api/memory/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ro -d ro"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ro-redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  langfuse-db:
    image: postgres:16
    container_name: ro-langfuse-db
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse_local
      POSTGRES_DB: langfuse
    volumes:
      - ./langfuse-data:/var/lib/postgresql/data

  langfuse:
    image: langfuse/langfuse:2
    container_name: ro-langfuse
    depends_on:
      - langfuse-db
    ports:
      - "3030:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse_local@langfuse-db:5432/langfuse
      NEXTAUTH_URL: http://localhost:3030
      NEXTAUTH_SECRET: dev_only_not_a_real_secret
      SALT: dev_only_not_a_real_salt
      TELEMETRY_ENABLED: "false"
      LANGFUSE_INIT_ORG_ID: ro
      LANGFUSE_INIT_PROJECT_ID: ro
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: pk-lf-ro-local
      LANGFUSE_INIT_PROJECT_SECRET_KEY: sk-lf-ro-local
